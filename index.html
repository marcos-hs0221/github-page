<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portfólio</title>

  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      background-color: #020817;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container{
      text-align: center;
      width: 100%;
      max-width: 500px;
      padding: 20px;
    }

    h1{
      color: #3b82f6;
      font-size: 42px;
      margin-bottom: 25px;
      font-weight: bold;
    }

    .subtitle{
      font-size: 30px;
      margin-bottom: 40px;
      color: white;
    }

    .btn{
      display: block;
      width: 100%;
      padding: 18px;
      margin-bottom: 18px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 28px;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn-green{
      background-color: #16a34a;
      color: white;
    }

    .btn-green:hover{
      background-color: #15803d;
    }

    .btn-dark{
      background-color: #1e293b;
      color: white;
      border: 1px solid #334155;
    }

    .btn-dark:hover{
      background-color: #334155;
    }

    @media(max-width: 600px){

      h1{
        font-size: 28px;
      }

      .subtitle{
        font-size: 20px;
      }

      .btn{
        font-size: 20px;
        padding: 15px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>Fernanda Hellen - Ciência de Dados</h1>

    <p class="subtitle">Desafio: Entrega Intermediária</p>

    <a href="#" class="btn btn-green">
      Acessar Meu Google Sites
    </a>

    <a href="#" class="btn btn-dark">
      Abrir Documentação (Currículo)
    </a>

    <a href="#" class="btn btn-dark">
      Abrir Apresentação do Portfólio
    </a>

  </div>

</body>
</html>
